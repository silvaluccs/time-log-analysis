name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build and run container
        run: docker compose up --build --exit-code-from timesheet-analyzer

      - name: Verify result.json was generated
        run: test -f result.json
